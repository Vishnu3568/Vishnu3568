<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Blue-to-Purple Gradient matching the design system -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#A970FF" />
    </linearGradient>
  </defs>

  <!-- Animated Background Wave Group (SMIL Parallax) -->
  <g>
    <path d="M 0,0 L 1600,0 L 1600,150 C 1490,130 1380,190 1200,170 C 1020,150 910,180 800,150 C 690,130 580,190 400,170 C 220,150 110,180 0,150 Z" fill="#A970FF" opacity="0.25" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="24s" 
      repeatCount="indefinite" />
  </g>

  <!-- Animated Foreground Wave Group (SMIL Main Banner - Mathematically Loop-Aligned) -->
  <g>
    <path d="M 0,0 L 1600,0 L 1600,165 C 1480,175 1350,115 1200,155 C 1050,195 920,135 800,165 C 680,175 550,115 400,155 C 250,195 120,135 0,165 Z" fill="url(#bannerGrad)" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="14s" 
      repeatCount="indefinite" />
  </g>

  <!-- Static Centered Name Text -->
  <text x="400" y="90" 
        text-anchor="middle" 
        fill="#F0F6FC" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="40px" 
        font-weight="800" 
        letter-spacing="-0.5px">Vishnu Vardhan Uppari</text>

  <!-- Static Centered Subtitle Text -->
  <text x="400" y="125" 
        text-anchor="middle" 
        fill="#F0F6FC" 
        opacity="0.9"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="15px" 
        font-weight="500" 
        letter-spacing="0.5px">Software Engineer • Full Stack Developer • Builder</text>
</svg>
