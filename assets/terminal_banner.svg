<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Blue-to-Purple Gradient matching the design system -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#A970FF" />
    </linearGradient>
  </defs>

  <!-- Animated Background Wave Group (SMIL Parallax - Mathematically Smooth Sine Wave) -->
  <g>
    <path d="M 0,0 L 1600,0 L 1600,145 C 1490,185 1310,185 1200,145 C 1090,105 910,105 800,145 C 690,185 510,185 400,145 C 290,105 110,105 0,145 Z" fill="#A970FF" opacity="0.25" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="24s" 
      repeatCount="indefinite" />
  </g>

  <!-- Animated Foreground Wave Group (SMIL Main Banner - Mathematically Smooth Sine Wave) -->
  <g>
    <path d="M 0,0 L 1600,0 L 1600,150 C 1490,110 1310,110 1200,150 C 1090,190 910,190 800,150 C 690,110 510,110 400,150 C 290,190 110,190 0,150 Z" fill="url(#bannerGrad)" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="14s" 
      repeatCount="indefinite" />
  </g>

  <!-- Static Centered Name Text -->
  <text x="400" y="90" 
        text-anchor="middle" 
        fill="#F0F6FC" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="40px" 
        font-weight="800" 
        letter-spacing="-0.5px">Vishnu Vardhan Uppari</text>

  <!-- Static Centered Subtitle Text -->
  <text x="400" y="125" 
        text-anchor="middle" 
        fill="#F0F6FC" 
        opacity="0.9"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="15px" 
        font-weight="500" 
        letter-spacing="0.5px">AI Engineer in Progress • Learning in Public • Building Every Day</text>
</svg>
