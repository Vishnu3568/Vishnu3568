<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Bar Gradients (GitHub Native Blues and Purples) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A970FF" />
      <stop offset="100%" stop-color="#8957e5" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#d29922" />
    </linearGradient>

    <style>
      .panel-title { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 13px; fill: #FFB347; font-weight: 700; letter-spacing: 0.5px; }
      .text-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #8B949E; }
      .text-bold { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #F0F6FC; font-weight: bold; }
      .text-code { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 12px; fill: #F0F6FC; }
      .text-muted { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 11px; fill: #8B949E; }
      .bar-bg { fill: #161B22; rx: 3; ry: 3; }
      .checkbox-active { fill: #58A6FF; }
    </style>
  </defs>

  <!-- Panel Canvas Container -->
  <rect x="0" y="0" width="800" height="240" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="1.5" />

  <!-- Column 1: Core Technologies (Resource Allocation) (X offset: 40px) -->
  <g transform="translate(40, 30)">
    <text x="0" y="0" class="panel-title">[ TECH_ALLOCATION ]</text>
    
    <!-- Java Backend -->
    <text x="0" y="30" class="text-label">Java / Spring Boot</text>
    <text x="200" y="30" class="text-bold" text-anchor="end">50%</text>
    <rect x="0" y="38" width="200" height="6" class="bar-bg" />
    <rect x="0" y="38" width="100" height="6" fill="url(#primaryGrad)" rx="3" ry="3" />

    <!-- Web Technology -->
    <text x="0" y="75" class="text-label">React / Frontend</text>
    <text x="200" y="75" class="text-bold" text-anchor="end">30%</text>
    <rect x="0" y="83" width="200" height="6" class="bar-bg" />
    <rect x="0" y="83" width="60" height="6" fill="url(#secondaryGrad)" rx="3" ry="3" />

    <!-- DevOps & Database -->
    <text x="0" y="120" class="text-label">Docker / SQL / Git</text>
    <text x="200" y="120" class="text-bold" text-anchor="end">15%</text>
    <rect x="0" y="128" width="200" height="6" class="bar-bg" />
    <rect x="0" y="128" width="30" height="6" fill="url(#accentGrad)" rx="3" ry="3" />

    <!-- AI Integrations -->
    <text x="0" y="165" class="text-label">AI / REST APIs</text>
    <text x="200" y="165" class="text-bold" text-anchor="end">5%</text>
    <rect x="0" y="173" width="200" height="6" class="bar-bg" />
    <rect x="0" y="173" width="10" height="6" fill="#8B949E" rx="3" ry="3" />
  </g>

  <!-- Dashed Vertical Column Divider 1 (x: 290) -->
  <line x1="290" y1="20" x2="290" y2="220" stroke="#30363D" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Column 2: System Spec Overview (X offset: 330px) -->
  <g transform="translate(330, 30)">
    <text x="0" y="0" class="panel-title">[ WORKSPACE_METRICS ]</text>
    
    <g transform="translate(0, 20)">
      <!-- Table Headers -->
      <text x="0" y="15" class="text-code" fill="#8B949E">METRIC</text>
      <text x="170" y="15" class="text-code" fill="#8B949E" text-anchor="end">SPECIFICATION</text>
      
      <!-- Table Header Line -->
      <line x1="0" y1="22" x2="170" y2="22" stroke="#30363D" stroke-width="1" />

      <!-- Row 1 -->
      <text x="0" y="42" class="text-label">Active Stack</text>
      <text x="170" y="42" class="text-code" text-anchor="end">Full Stack / OOP</text>

      <!-- Row 2 -->
      <text x="0" y="67" class="text-label">Primary Paradigm</text>
      <text x="170" y="67" class="text-code" text-anchor="end">REST / Microservices</text>

      <!-- Row 3 -->
      <text x="0" y="92" class="text-label">DB Engine</text>
      <text x="170" y="92" class="text-code" text-anchor="end">PostgreSQL &amp; MySQL</text>

      <!-- Row 4 -->
      <text x="0" y="117" class="text-label">Environments</text>
      <text x="170" y="117" class="text-code" text-anchor="end">Docker Containers</text>

      <!-- Row 5 -->
      <text x="0" y="142" class="text-label">VCS Engine</text>
      <text x="170" y="142" class="text-code" text-anchor="end">Git / GitHub</text>
    </g>
  </g>

  <!-- Dashed Column Divider 2 (x: 540) -->
  <line x1="540" y1="20" x2="540" y2="220" stroke="#30363D" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Column 3: Active Architecture Verification Checks (X offset: 580px) -->
  <g transform="translate(580, 30)">
    <text x="0" y="0" class="panel-title">[ VERIFIED_CAPABILITIES ]</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 30)">
      <circle cx="8" cy="5" r="5" class="checkbox-active" />
      <text x="25" y="9" class="text-bold">REST Microservices</text>
      <text x="25" y="24" class="text-muted" font-size="10">JWT Auth / API Gateways</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 75)">
      <circle cx="8" cy="5" r="5" class="checkbox-active" />
      <text x="25" y="9" class="text-bold">Data Architecture</text>
      <text x="25" y="24" class="text-muted" font-size="10">Relational Schema Designs</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 120)">
      <circle cx="8" cy="5" r="5" class="checkbox-active" />
      <text x="25" y="9" class="text-bold">Containerized Runs</text>
      <text x="25" y="24" class="text-muted" font-size="10">Docker / Local Isolation</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(0, 165)">
      <circle cx="8" cy="5" r="5" fill="#8B949E" />
      <text x="25" y="9" class="text-bold">AI Integrations</text>
      <text x="25" y="24" class="text-muted" font-size="10">Active pipeline automation</text>
    </g>
  </g>
</svg>
