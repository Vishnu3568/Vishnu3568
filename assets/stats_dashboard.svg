<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <style>
      .mono-text { font-family: 'Fira Code', 'Courier New', Courier, monospace; }
      .panel-title { font-size: 13px; fill: #FFB347; font-weight: bold; letter-spacing: 0.5px; }
      .text-label { font-size: 12px; fill: #8B949E; }
      .text-bold { font-size: 12px; fill: #F0F6FC; font-weight: bold; }
      .text-code { font-size: 12px; fill: #F0F6FC; }
      .text-muted { font-size: 11px; fill: #8B949E; }
      .bar-bg { fill: #161B22; rx: 2; ry: 2; }
    </style>
  </defs>

  <!-- Panel Canvas Container -->
  <rect x="0" y="0" width="800" height="240" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1" />

  <!-- Column 1: Core Technologies (Resource Allocation) (X offset: 40px) -->
  <g transform="translate(40, 30)">
    <text x="0" y="0" class="mono-text panel-title">[ TECH_ALLOCATION ]</text>
    
    <!-- Python Backend -->
    <text x="0" y="30" class="mono-text text-label">Python / FastAPI</text>
    <text x="200" y="30" class="mono-text text-bold" text-anchor="end">45%</text>
    <rect x="0" y="38" width="200" height="6" class="bar-bg" />
    <rect x="0" y="38" width="90" height="6" fill="#58A6FF" rx="2" ry="2" />

    <!-- AI Agents & RAG -->
    <text x="0" y="75" class="mono-text text-label">AI Agents & RAG</text>
    <text x="200" y="75" class="mono-text text-bold" text-anchor="end">35%</text>
    <rect x="0" y="83" width="200" height="6" class="bar-bg" />
    <rect x="0" y="83" width="70" height="6" fill="#A970FF" rx="2" ry="2" />

    <!-- DevOps & Database -->
    <text x="0" y="120" class="mono-text text-label">Docker / SQL / Git</text>
    <text x="200" y="120" class="mono-text text-bold" text-anchor="end">15%</text>
    <rect x="0" y="128" width="200" height="6" class="bar-bg" />
    <rect x="0" y="128" width="30" height="6" fill="#FFB347" rx="2" ry="2" />

    <!-- LLMs & Vector DBs -->
    <text x="0" y="165" class="mono-text text-label">LLMs & Vector DBs</text>
    <text x="200" y="165" class="mono-text text-bold" text-anchor="end">10%</text>
    <rect x="0" y="173" width="200" height="6" class="bar-bg" />
    <rect x="0" y="173" width="20" height="6" fill="#8B949E" rx="2" ry="2" />
  </g>

  <!-- Dashed Vertical Column Divider 1 (x: 290) -->
  <line x1="290" y1="20" x2="290" y2="220" stroke="#30363D" stroke-width="1" stroke-dasharray="3 3" />

  <!-- Column 2: System Spec Overview (X offset: 330px) -->
  <g transform="translate(330, 30)">
    <text x="0" y="0" class="mono-text panel-title">[ WORKSPACE_METRICS ]</text>
    
    <g transform="translate(0, 20)">
      <!-- Table Headers -->
      <text x="0" y="15" class="mono-text text-code" fill="#8B949E">METRIC</text>
      <text x="170" y="15" class="mono-text text-code" fill="#8B949E" text-anchor="end">SPECIFICATION</text>
      
      <!-- Table Header Line -->
      <line x1="0" y1="22" x2="170" y2="22" stroke="#30363D" stroke-width="1" />

      <!-- Row 1 -->
      <text x="0" y="42" class="mono-text text-label">Active Stack</text>
      <text x="170" y="42" class="mono-text text-code" text-anchor="end" fill="#58A6FF">Python / AI</text>

      <!-- Row 2 -->
      <text x="0" y="67" class="mono-text text-label">Primary Paradigm</text>
      <text x="170" y="67" class="mono-text text-code" text-anchor="end" fill="#A970FF">OOP / Async</text>

      <!-- Row 3 -->
      <text x="0" y="92" class="mono-text text-label">DB Engine</text>
      <text x="170" y="92" class="mono-text text-code" text-anchor="end" fill="#F0F6FC">SQL / Vector</text>

      <!-- Row 4 -->
      <text x="0" y="117" class="mono-text text-label">Environments</text>
      <text x="170" y="117" class="mono-text text-code" text-anchor="end" fill="#FFB347">Docker</text>

      <!-- Row 5 -->
      <text x="0" y="142" class="mono-text text-label">VCS Engine</text>
      <text x="170" y="142" class="mono-text text-code" text-anchor="end" fill="#8B949E">Git/GitHub</text>
    </g>
  </g>

  <!-- Dashed Column Divider 2 (x: 540) -->
  <line x1="540" y1="20" x2="540" y2="220" stroke="#30363D" stroke-width="1" stroke-dasharray="3 3" />

  <!-- Column 3: Active Architecture Verification Checks (X offset: 580px) -->
  <g transform="translate(580, 30)">
    <text x="0" y="0" class="mono-text panel-title">[ VERIFIED_RUNS ]</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 30)">
      <text x="0" y="9" class="mono-text text-code" fill="#58A6FF">[x]</text>
      <text x="28" y="9" class="mono-text text-bold">FastAPI Services</text>
      <text x="28" y="24" class="mono-text text-muted">Async / REST APIs</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 75)">
      <text x="0" y="9" class="mono-text text-code" fill="#58A6FF">[x]</text>
      <text x="28" y="9" class="mono-text text-bold">Vector &amp; Rel DB</text>
      <text x="28" y="24" class="mono-text text-muted">Schema / Embeddings</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 120)">
      <text x="0" y="9" class="mono-text text-code" fill="#8B949E">[ ]</text>
      <text x="28" y="9" class="mono-text text-bold" fill="#8B949E">Agent Workflows</text>
      <text x="28" y="24" class="mono-text text-muted">LangChain / CrewAI</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(0, 165)">
      <text x="0" y="9" class="mono-text text-code" fill="#8B949E">[ ]</text>
      <text x="28" y="9" class="mono-text text-bold" fill="#8B949E">Dockerized Env</text>
      <text x="28" y="24" class="mono-text text-muted">Containerized Runs</text>
    </g>
  </g>
</svg>
