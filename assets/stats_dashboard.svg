<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Obsidian Canvas Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Tech Progress Bar Gradients -->
    <linearGradient id="javaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="springGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <style>
      .panel-title { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 13px; fill: #10b981; font-weight: 700; letter-spacing: 0.5px; }
      .text-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #94a3b8; }
      .text-bold { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #f8fafc; font-weight: bold; }
      .text-code { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 12px; fill: #e2e8f0; }
      .text-muted { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 11px; fill: #64748b; }
      .bar-bg { fill: #1e293b; rx: 3; ry: 3; }
    </style>
  </defs>

  <!-- Panel Canvas Container -->
  <rect x="0" y="0" width="800" height="240" rx="8" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Column 1: Core Technologies (Resource Allocation) (X offset: 40px) -->
  <g transform="translate(40, 30)">
    <text x="0" y="0" class="panel-title">[ RESOURCE_ALLOCATION ]</text>
    
    <!-- Java Backend -->
    <text x="0" y="30" class="text-label">Java / Spring Boot</text>
    <text x="200" y="30" class="text-bold" text-anchor="end">50%</text>
    <rect x="0" y="38" width="200" height="6" class="bar-bg" />
    <rect x="0" y="38" width="100" height="6" fill="url(#javaGrad)" rx="3" ry="3" />

    <!-- Web Technology -->
    <text x="0" y="75" class="text-label">React / Frontend</text>
    <text x="200" y="75" class="text-bold" text-anchor="end">30%</text>
    <rect x="0" y="83" width="200" height="6" class="bar-bg" />
    <rect x="0" y="83" width="60" height="6" fill="url(#jsGrad)" rx="3" ry="3" />

    <!-- DevOps & Database -->
    <text x="0" y="120" class="text-label">Docker / SQL / Git</text>
    <text x="200" y="120" class="text-bold" text-anchor="end">15%</text>
    <rect x="0" y="128" width="200" height="6" class="bar-bg" />
    <rect x="0" y="128" width="30" height="6" fill="url(#springGrad)" rx="3" ry="3" />

    <!-- AI Integrations -->
    <text x="0" y="165" class="text-label">AI / REST APIs</text>
    <text x="200" y="165" class="text-bold" text-anchor="end">5%</text>
    <rect x="0" y="173" width="200" height="6" class="bar-bg" />
    <rect x="0" y="173" width="10" height="6" fill="#a855f7" rx="3" ry="3" />
  </g>

  <!-- Dashed Vertical Column Divider 1 (x: 290) -->
  <line x1="290" y1="20" x2="290" y2="220" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Column 2: System Process Statistics (X offset: 330px) -->
  <g transform="translate(330, 30)">
    <text x="0" y="0" class="panel-title">[ RUNNING_PROCESSES ]</text>
    
    <g transform="translate(0, 20)">
      <!-- Table Headers -->
      <text x="0" y="15" class="text-code" fill="#64748b">PID</text>
      <text x="50" y="15" class="text-code" fill="#64748b">PROCESS</text>
      <text x="160" y="15" class="text-code" fill="#64748b" text-anchor="end">STATUS</text>
      
      <!-- Table Header Line -->
      <line x1="0" y1="22" x2="160" y2="22" stroke="#1e293b" stroke-width="1" />

      <!-- Row 1 -->
      <text x="0" y="42" class="text-muted">3568</text>
      <text x="50" y="42" class="text-code">java-apis</text>
      <text x="160" y="42" class="text-code" fill="#10b981" text-anchor="end">active</text>

      <!-- Row 2 -->
      <text x="0" y="67" class="text-muted">4021</text>
      <text x="50" y="67" class="text-code">react-app</text>
      <text x="160" y="67" class="text-code" fill="#10b981" text-anchor="end">active</text>

      <!-- Row 3 -->
      <text x="0" y="92" class="text-muted">8902</text>
      <text x="50" y="92" class="text-code">docker-ops</text>
      <text x="160" y="92" class="text-code" fill="#3b82f6" text-anchor="end">idle</text>

      <!-- Row 4 -->
      <text x="0" y="117" class="text-muted">1104</text>
      <text x="50" y="117" class="text-code">ai-agents</text>
      <text x="160" y="117" class="text-code" fill="#10b981" text-anchor="end">running</text>

      <!-- Row 5 -->
      <text x="0" y="142" class="text-muted">0512</text>
      <text x="50" y="142" class="text-code">git-sync</text>
      <text x="160" y="142" class="text-code" fill="#64748b" text-anchor="end">sleeping</text>
    </g>
  </g>

  <!-- Das Dashed Column Divider 2 (x: 540) -->
  <line x1="540" y1="20" x2="540" y2="220" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Column 3: Health Checks / Indicators (X offset: 580px) -->
  <g transform="translate(580, 30)">
    <text x="0" y="0" class="panel-title">[ STATUS_HEALTH ]</text>
    
    <!-- Health Row 1 -->
    <g transform="translate(0, 30)">
      <circle cx="10" cy="5" r="5" fill="#10b981" />
      <text x="25" y="9" class="text-bold">REST Services</text>
      <text x="25" y="24" class="text-muted" font-size="10">API Health: 100% OK</text>
    </g>

    <!-- Health Row 2 -->
    <g transform="translate(0, 75)">
      <circle cx="10" cy="5" r="5" fill="#10b981" />
      <text x="25" y="9" class="text-bold">Database Queries</text>
      <text x="25" y="24" class="text-muted" font-size="10">Response Time: 12ms</text>
    </g>

    <!-- Health Row 3 -->
    <g transform="translate(0, 120)">
      <circle cx="10" cy="5" r="5" fill="#10b981" />
      <text x="25" y="9" class="text-bold">Containers</text>
      <text x="25" y="24" class="text-muted" font-size="10">All environments ready</text>
    </g>

    <!-- Health Row 4 -->
    <g transform="translate(0, 165)">
      <circle cx="10" cy="5" r="5" fill="#3b82f6" />
      <text x="25" y="9" class="text-bold">Vibe Check</text>
      <text x="25" y="24" class="text-muted" font-size="10">Status: Writing code</text>
    </g>
  </g>
</svg>
