<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="100%">
  <defs>
    <!-- Blue-to-Purple Gradient matching the design system -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#A970FF" />
    </linearGradient>
  </defs>

  <!-- Animated Background Wave Group (SMIL Parallax - Mathematically Smooth Sine Wave) -->
  <g>
    <path d="M 0,80 L 1600,80 L 1600,40 C 1490,70 1310,70 1200,40 C 1090,10 910,10 800,40 C 690,70 510,70 400,40 C 290,10 110,10 0,40 Z" fill="#A970FF" opacity="0.25" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="20s" 
      repeatCount="indefinite" />
  </g>

  <!-- Animated Foreground Wave Group (SMIL Main Banner - Mathematically Smooth Sine Wave) -->
  <g>
    <path d="M 0,80 L 1600,80 L 1600,35 C 1490,5 1310,5 1200,35 C 1090,65 910,65 800,35 C 690,5 510,5 400,35 C 290,65 110,65 0,35 Z" fill="url(#bannerGrad)" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="12s" 
      repeatCount="indefinite" />
  </g>
</svg>
