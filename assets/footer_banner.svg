<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="100%">
  <defs>
    <!-- Blue-to-Purple Gradient matching the design system -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#A970FF" />
    </linearGradient>
  </defs>

  <!-- Animated Background Wave Group (SMIL Parallax - Mathematically Loop-Aligned) -->
  <g>
    <path d="M 0,80 L 1600,80 L 1600,45 C 1490,65 1380,10 1200,30 C 1020,50 910,15 800,45 C 690,65 580,10 400,30 C 220,50 110,15 0,45 Z" fill="#A970FF" opacity="0.25" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="20s" 
      repeatCount="indefinite" />
  </g>

  <!-- Animated Foreground Wave Group (SMIL Main Banner - Mathematically Loop-Aligned) -->
  <g>
    <path d="M 0,80 L 1600,80 L 1600,35 C 1480,15 1350,75 1200,45 C 1055,15 920,65 800,35 C 680,15 550,75 400,45 C 255,15 120,65 0,35 Z" fill="url(#bannerGrad)" />
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="translate" 
      from="0 0" 
      to="-800 0" 
      dur="12s" 
      repeatCount="indefinite" />
  </g>
</svg>
